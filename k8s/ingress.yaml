apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leyline-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - leyline.com
    - www.leyline.com
    - api.leyline.com
    secretName: leyline-tls
  rules:
  - host: leyline.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leyline-landing
            port:
              number: 3000
  - host: www.leyline.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leyline-landing
            port:
              number: 3000
  - host: api.leyline.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leyline-api
            port:
              number: 3001
