apiVersion: apps/v1
kind: Deployment
metadata:
  name: leyline-api
  namespace: default
  labels:
    app: leyline-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leyline-api
  template:
    metadata:
      labels:
        app: leyline-api
    spec:
      containers:
      - name: api
        image: 394802158542.dkr.ecr.us-west-1.amazonaws.com/leyline-api:latest
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        # Add your environment variables here
        # - name: DATABASE_URL
        #   valueFrom:
        #     secretKeyRef:
        #       name: leyline-secrets
        #       key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: leyline-api
  namespace: default
  labels:
    app: leyline-api
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: leyline-api
